name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm turbo run lint --filter='!@webapp/web'

      - name: Test
        run: pnpm turbo run test --filter='!@webapp/e2e'

      - name: Build
        run: pnpm build

  api-db-tests:
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: webapp
          POSTGRES_PASSWORD: webapp
          POSTGRES_DB: webapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U webapp -d webapp"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgres://webapp:webapp@localhost:5432/webapp
      PROVIDER_ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Apply migrations
        run: pnpm --filter @webapp/api db:migrate

      - name: Run api tests with DATABASE_URL set
        run: pnpm --filter @webapp/api test

  e2e-smoke:
    # Non-blocking scaffold. Real UI scenarios land in wave 2 of the tooling
    # roadmap — see docs/technical/adr/0004-playwright-scaffold-only.md.
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Start API in background (in-memory mode — no DATABASE_URL)
        run: |
          pnpm --filter @webapp/api dev > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

      - name: Wait for API /health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/health > /dev/null; then
              echo "api is up"
              exit 0
            fi
            sleep 1
          done
          echo "api did not come up within 30s" >&2
          cat /tmp/api.log || true
          exit 1

      - name: Run smoke test
        run: pnpm --filter @webapp/e2e test

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill "$(cat /tmp/api.pid)" 2>/dev/null || true
          fi
